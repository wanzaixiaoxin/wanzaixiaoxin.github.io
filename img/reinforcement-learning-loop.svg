<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <style>
    .box { fill: #e3f2fd; stroke: #2196f3; stroke-width: 2; rx: 8; }
    .header { fill: #1976d2; }
    .item { fill: #f5f5f5; stroke: #ddd; }
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; }
    .label { font-weight: bold; fill: #333; text-anchor: middle; }
    .desc { font-size: 11px; fill: #666; text-anchor: middle; }
    .arrow { stroke: #666; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#666"/>
    </marker>
  </defs>

  <!-- 传统编程 -->
  <rect x="50" y="30" width="300" height="80" class="box"/>
  <rect x="50" y="30" width="300" height="30" class="header"/>
  <text x="200" y="50" text-anchor="middle" class="label" style="fill:white;font-size:14px">传统编程</text>
  <rect x="70" y="80" width="260" height="50" class="item"/>
  <text x="200" y="105" text-anchor="middle" class="label">输入：规则 + 数据</text>
  <text x="200" y="120" text-anchor="middle" class="desc">例如：「如果胡须+耳朵=猫」</text>
  <path d="M200 130 L200 145" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="70" y="145" width="260" height="50" class="item" fill="#e3f2fd"/>
  <text x="200" y="172" text-anchor="middle" class="label">输出：答案</text>

  <!-- 箭头 -->
  <path d="M360 165 L380 165" class="arrow" stroke="#999" stroke-dasharray="5,5"/>

  <!-- 机器学习 -->
  <rect x="450" y="30" width="300" height="80" class="box"/>
  <rect x="450" y="30" width="300" height="30" class="header" fill="#388e3c"/>
  <text x="600" y="50" text-anchor="middle" class="label" style="fill:white;font-size:14px">机器学习</text>
  <rect x="470" y="80" width="260" height="50" class="item"/>
  <text x="600" y="105" text-anchor="middle" class="label">输入：数据 + 答案</text>
  <text x="600" y="120" text-anchor="middle" class="desc">例如：1000张标注好的猫/非猫图</text>
  <path d="M600 130 L600 145" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="470" y="145" width="260" height="50" class="item" fill="#e8f5e9"/>
  <text x="600" y="172" text-anchor="middle" class="label">输出：规则（模型）</text>

  <!-- 底部说明 -->
  <text x="400" y="190" text-anchor="middle" style="font-size:12px; fill:#999">
    传统编程：你写规则 | 机器学习：机器自己总结规则
  </text>
</svg>
