<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 2; rx: 8; }
    .center { fill: #fff3e0; stroke: #f57c00; stroke-width: 3; }
    .sector { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2; }
    .item { fill: #e8f5e9; stroke: #43a047; stroke-width: 1; rx: 4; }
    .label { font-size: 18px; font-weight: bold; fill: #333; text-anchor: middle; }
    .small { font-size: 13px; fill: #666; text-anchor: middle; }
    .arrow { stroke: #999; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="400" y="30" class="label" font-size="20">AI 驱动的社会新生态</text>
  <text x="400" y="55" class="small">工作 · 教育 · 生活 三位一体</text>

  <!-- 中心 -->
  <rect x="320" y="80" width="160" height="80" class="center"/>
  <text x="400" y="115" class="label" font-size="16">大模型</text>
  <text x="400" y="135" class="small">AI 基础设施</text>

  <!-- 工作 -->
  <rect x="20" y="220" width="220" height="120" class="sector"/>
  <text x="130" y="250" class="label" font-size="16">工作</text>
  <rect x="30" y="270" width="200" height="25" class="item"/>
  <text x="130" y="287" class="small">新职业：提示工程师、AI训练师</text>
  <rect x="30" y="300" width="200" height="25" class="item"/>
  <text x="130" y="317" class="small">远程协作 + AI 助手</text>
  <rect x="30" y="330" width="200" height="25" class="item"/>
  <text x="130" y="347" class="small">零工经济平台化</text>

  <!-- 教育 -->
  <rect x="560" y="220" width="220" height="120" class="sector"/>
  <text x="670" y="250" class="label" font-size="16">教育</text>
  <rect x="570" y="270" width="200" height="25" class="item"/>
  <text x="670" y="287" class="small">个性化学习路径</text>
  <rect x="570" y="300" width="200" height="25" class="item"/>
  <text x="670" y="317" class="small">AI 导师 24/7</text>
  <rect x="570" y="330" width="200" height="25" class="item"/>
  <text x="670" y="347" class="small">终身学习订阅制</text>

  <!-- 生活 -->
  <rect x="290" y="420" width="220" height="120" class="sector"/>
  <text x="400" y="450" class="label" font-size="16">生活</text>
  <rect x="300" y="470" width="200" height="25" class="item"/>
  <text x="400" y="487" class="small">智能家居 + 数字分身</text>
  <rect x="300" y="500" width="200" height="25" class="item"/>
  <text x="400" y="517" class="small">健康管理 AI 助手</text>
  <rect x="300" y="530" width="200" height="25" class="item"/>
  <text x="400" y="547" class="small">娱乐内容个性化</text>

  <!-- arrows -->
  <line x1="400" y1="160" x2="130" y2="220" class="arrow"/>
  <line x1="400" y1="160" x2="670" y2="220" class="arrow"/>
  <line x1="400" y1="160" x2="400" y2="420" class="arrow"/>

  <!-- 底部反馈 -->
  <path d="M 130 340 Q 200 380 260 360" fill="none" stroke="#1976d2" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="200" y="395" class="small" font-size="11">反馈循环</text>

  <path d="M 670 340 Q 600 380 540 360" fill="none" stroke="#1976d2" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="600" y="395" class="small" font-size="11">反馈循环</text>

  <!-- 社会影响 -->
  <rect x="50" y="540" width="700" height="40" fill="#f5f5f5" stroke="#ddd"/>
  <text x="400" y="565" class="small" font-size="13">社会整体效应：更低门槛、更高效率、更个性化体验 → 生活质量提升</text>

</svg>