<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <style>
    .box { fill: #f5f5f5; stroke: #333; stroke-width: 2; rx: 6; }
    .header { fill: #1976d2; }
    .label { font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
    .desc { font-size: 12px; fill: #666; text-anchor: middle; }
    .arrow { stroke: #666; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
    .input { fill: #e3f2fd; }
    .process { fill: #e8f5e9; }
    .output { fill: #fff3e0; }
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="400" y="30" class="label" font-size="18">AIGC 工作流程</text>

  <!-- 用户输入 -->
  <rect x="300" y="60" width="200" height="60" class="box input"/>
  <text x="400" y="90" class="label">用户输入</text>
  <text x="400" y="110" class="desc">描述 / 指令</text>

  <!-- 箭头 -->
  <line x1="400" y1="120" x2="400" y2="160" class="arrow"/>
  <text x="420" y="150" class="desc" font-size="11">发送</text>

  <!-- 大模型 -->
  <rect x="250" y="170" width="300" height="100" class="box process"/>
  <text x="400" y="200" class="label">大模型（生成引擎）</text>
  <text x="400" y="220" class="desc">预测下一个词/像素</text>
  <text x="400" y="240" class="desc">迭代生成</text>

  <!-- 箭头 -->
  <line x1="400" y1="270" x2="400" y2="320" class="arrow"/>
  <text x="420" y="295" class="desc" font-size="11">输出</text>

  <!-- 生成内容 -->
  <rect x="300" y="330" width="200" height="80" class="box output"/>
  <text x="400" y="365" class="label">生成内容</text>
  <text x="400" y="385" class="desc">文本 / 图片 / 代码</text>

  <!-- 三种应用分支 -->
  <line x1="400" y1="370" x2="100" y2="370" class="arrow"/>
  <text x="200" y="360" class="desc" font-size="11">写文章</text>
  <rect x="30" y="350" width="80" height="40" class="box" fill="#e3f2fd"/>
  <text x="70" y="375" class="desc" font-size="11">📝</text>

  <line x1="400" y1="370" x2="400" y2="450" class="arrow"/>
  <text x="420" y="435" class="desc" font-size="11">生成图片</text>
  <rect x="360" y="430" width="80" height="40" class="box" fill="#e8f5e9"/>
  <text x="400" y="455" class="desc" font-size="11">🎨</text>

  <line x1="400" y1="370" x2="700" y2="370" class="arrow"/>
  <text x="600" y="360" class="desc" font-size="11">写代码</text>
  <rect x="620" y="350" width="80" height="40" class="box" fill="#fff3e0"/>
  <text x="660" y="375" class="desc" font-size="11">💻</text>

</svg>