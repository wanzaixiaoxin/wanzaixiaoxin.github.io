<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="gradBad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcdd2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffebee;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradGood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f5e9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="#fafafa"/>
  
  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">智能切片：语义保持的关键</text>
  
  <!-- 左侧：错误的切片方式 -->
  <rect x="30" y="60" width="340" height="300" rx="10" fill="url(#gradBad)" stroke="#f44336" stroke-width="2"/>
  <text x="200" y="90" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#c62828">❌ 固定长度切片（问题）</text>
  
  <!-- 示例文档（错误） -->
  <g font-family="Arial" font-size="10">
    <!-- 文档块 -->
    <rect x="50" y="105" width="300" height="180" fill="#fff" stroke="#ffcdd2" stroke-width="1" rx="4"/>
    
    <!-- 切片 1 -->
    <rect x="55" y="110" width="290" height="50" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="2"/>
    <text x="60" y="125" fill="#c62828" font-weight="bold">Chunk 1 (前 500 字符)</text>
    <text x="60" y="140" fill="#666" font-size="9">"安装 Python 的第一步是下载...</text>
    
    <!-- 切割线 -->
    <line x1="55" y1="160" x2="345" y2="160" stroke="#f44336" stroke-width="1" stroke-dasharray="3,2"/>
    
    <!-- 切片 2 -->
    <rect x="55" y="162" width="290" height="50" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="2"/>
    <text x="60" y="177" fill="#c62828" font-weight="bold">Chunk 2 (500-1000)</text>
    <text x="60" y="192" fill="#666" font-size="9">"设置环境变量，然后重启终端..."</text>
    
    <!-- 切割线 -->
    <line x1="55" y1="212" x2="345" y2="212" stroke="#f44336" stroke-width="1" stroke-dasharray="3,2"/>
    
    <!-- 切片 3 -->
    <rect x="55" y="214" width="290" height="69" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="2"/>
    <text x="60" y="229" fill="#c62828" font-weight="bold">Chunk 3 (1000-1500)</text>
    <text x="60" y="244" fill="#666" font-size="9">"验证安装：python --version...（这里包含配置的结尾部分）"</text>
    
    <!-- 标注 -->
    <text x="200" y="320" text-anchor="middle" font-family="Arial" font-size="11" fill="#c62828">
      <tspan x="200" dy="0">⚠️ 语义被切断：配置步骤分散在多个 chunk</tspan>
      <tspan x="200" dy="16">检索时可能只返回 Chunk 2，导致信息不全</tspan>
      <tspan x="200" dy="16">召回率低 40-60%</tspan>
    </text>
  </g>
  
  <!-- 右侧：正确的智能切片 -->
  <rect x="430" y="60" width="340" height="300" rx="10" fill="url(#gradGood)" stroke="#4caf50" stroke-width="2"/>
  <text x="600" y="90" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#2e7d32">✅ 语义感知切片（推荐）</text>
  
  <!-- 示例文档（正确） -->
  <g font-family="Arial" font-size="10">
    <!-- 文档块 -->
    <rect x="450" y="105" width="300" height="180" fill="#fff" stroke="#c8e6c9" stroke-width="1" rx="4"/>
    
    <!-- 完整语义块 1 -->
    <rect x="455" y="110" width="290" height="80" fill="#e8f5e9" stroke="#4caf50" stroke-width="1" rx="2"/>
    <text x="460" y="130" fill="#2e7d32" font-weight="bold">Chunk A: 安装流程（完整）</text>
    <text x="460" y="145" fill="#666" font-size="9">"1. 下载 Python 安装包</text>
    <text x="460" y="158" fill="#666" font-size="9">2. 运行安装程序，勾选 'Add to PATH'</text>
    <text x="460" y="171" fill="#666" font-size="9">3. 重启终端"</text>
    
    <!-- 重叠缓冲 -->
    <rect x="455" y="192" width="290" height="30" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="2"/>
    <text x="460" y="207" fill="#f57c00" font-size="9" font-weight="bold">重叠缓冲区（50字符）</text>
    
    <!-- 完整语义块 2 -->
    <rect x="455" y="223" width="290" height="60" fill="#e8f5e9" stroke="#4caf50" stroke-width="1" rx="2"/>
    <text x="460" y="243" fill="#2e7d32" font-weight="bold">Chunk B: 环境变量配置</text>
    <text x="460" y="256" fill="#666" font-size="9">"设置 PATH：控制面板 → 系统 → 高级 → 环境变量"</text>
    
    <!-- 标注 -->
    <text x="600" y="320" text-anchor="middle" font-family="Arial" font-size="11" fill="#2e7d32">
      <tspan x="600" dy="0">✅ 语义完整：每个 chunk 是独立完整的概念</tspan>
      <tspan x="600" dy="16">✅ 重叠缓冲：避免语义边界丢失</tspan>
      <tspan x="600" dy="16">✅ 召回率高：相关步骤集中在同一 chunk</tspan>
    </text>
  </g>
  
  <!-- 中间标注 -->
  <text x="400" y="195" text-anchor="middle" font-family="Arial" font-size="12" fill="#ff9800" font-weight="bold">
    切片策略决定语义完整性
  </text>
  
  <!-- 底部说明 -->
  <text x="400" y="380" text-anchor="middle" font-family="Arial" font-size="11" fill="#999">
    智能切片策略：按段落/标题分割 + 语义重叠 + 保留元数据
  </text>
</svg>
