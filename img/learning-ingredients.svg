<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 2; rx: 6; }
    .icon { font-size: 48px; text-anchor: middle; fill: #1976d2; }
    .label { font-size: 16px; font-weight: bold; fill: #333; text-anchor: middle; }
    .desc { font-size: 13px; fill: #666; text-anchor: middle; }
    .arrow { stroke: #666; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="400" y="30" class="label" font-size="18">机器学习的三个核心成分</text>

  <!-- 数据 -->
  <rect x="50" y="60" width="180" height="160" class="box" fill="#e3f2fd"/>
  <text x="140" y="100" class="icon">📊</text>
  <text x="140" y="140" class="label">数据</text>
  <text x="140" y="165" class="desc">燃料</text>
  <text x="140" y="200" class="desc" font-size="11">越多越好</text>

  <!-- 箭头 -->
  <line x1="230" y1="140" x2="290" y2="140" class="arrow"/>
  <text x="260" y="155" class="desc" font-size="12">输入</text>

  <!-- 模型 -->
  <rect x="310" y="60" width="180" height="160" class="box" fill="#e8f5e9"/>
  <text x="400" y="100" class="icon">🧠</text>
  <text x="400" y="140" class="label">模型</text>
  <text x="400" y="165" class="desc">发动机</text>
  <text x="400" y="200" class="desc" font-size="11">神经网络结构</text>

  <!-- 箭头 -->
  <line x1="490" y1="140" x2="550" y2="140" class="arrow"/>
  <text x="520" y="155" class="desc" font-size="12">处理</text>

  <!-- 算法 -->
  <rect x="570" y="60" width="180" height="160" class="box" fill="#fff3e0"/>
  <text x="660" y="100" class="icon">⚙️</text>
  <text x="660" y="140" class="label">算法</text>
  <text x="660" y="165" class="desc">驾驶技术</text>
  <text x="660" y="200" class="desc" font-size="11">如何调整参数</text>

  <!-- 底部说明 -->
  <text x="400" y="290" class="desc" font-size="12">三者缺一不可，共同决定 AI 的能力</text>

</svg>