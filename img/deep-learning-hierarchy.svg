<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340" viewBox="0 0 800 340">
  <style>
    .layer { fill: #bbdefb; stroke: #2196f3; stroke-width: 2; }
    .layer-1 { fill: #ffcdd2; stroke: #f44336; }
    .layer-2 { fill: #c8e6c9; stroke: #4caf50; }
    .layer-3 { fill: #fff9c4; stroke: #ffeb3b; }
    .layer-4 { fill: #e1bee7; stroke: #9c27b0; }
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .label { font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
    .desc { font-size: 11px; fill: #666; text-anchor: middle; }
  </style>

  <!-- Layer 4 - Top -->
  <rect x="300" y="20" width="200" height="70" class="layer-4"/>
  <text x="400" y="55" class="label">完整概念</text>
  <text x="400" y="72" class="desc">「猫的脸」「汽车」「人脸」</text>

  <!-- Layer 3 -->
  <rect x="280" y="110" width="240" height="70" class="layer-3"/>
  <text x="400" y="145" class="label">物体组合</text>
  <text x="400" y="162" class="desc">眼睛、耳朵、轮子、车身</text>

  <!-- Layer 2 -->
  <rect x="260" y="200" width="280" height="70" class="layer-2"/>
  <text x="400" y="235" class="label">形状特征</text>
  <text x="400" y="252" class="desc">圆形、三角形、曲线、边缘</text>

  <!-- Layer 1 - Bottom -->
  <rect x="240" y="290" width="320" height="60" class="layer-1"/>
  <text x="400" y="325" class="label">底层特征</text>
  <text x="400" y="342" class="desc">像素点、线条、颜色、纹理</text>

  <!-- Connection arrows -->
  <path d="M340 110 L340 120" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M400 200 L400 210" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M400 290 L400 300" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Bottom label -->
  <text x="400" y="380" text-anchor="middle" style="font-size:13px; fill:#666">
    输入：原始像素数据 → 逐层抽象 → 高层语义
  </text>
</svg>