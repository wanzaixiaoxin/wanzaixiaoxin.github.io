<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <style>
    .box { fill: #f9f9f9; stroke: #333; stroke-width: 2; rx: 8; }
    .header { fill: #1976d2; }
    .label { font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
    .desc { font-size: 12px; fill: #666; text-anchor: middle; }
    .arrow { stroke: #666; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="400" y="30" class="label" font-size="18">三种学习方式</text>

  <!-- 监督学习 -->
  <rect x="50" y="60" width="200" height="120" class="box" fill="#e3f2fd"/>
  <text x="150" y="90" class="label">监督学习</text>
  <text x="150" y="110" class="desc">有老师教</text>
  <text x="150" y="130" class="desc">数据+标签</text>
  <text x="150" y="150" class="desc">分类/回归</text>

  <!-- 无监督学习 -->
  <rect x="300" y="60" width="200" height="120" class="box" fill="#e8f5e9"/>
  <text x="400" y="90" class="label">无监督学习</text>
  <text x="400" y="110" class="desc">自己找规律</text>
  <text x="400" y="130" class="desc">数据无标签</text>
  <text x="400" y="150" class="desc">聚类/降维</text>

  <!-- 强化学习 -->
  <rect x="550" y="60" width="200" height="120" class="box" fill="#fff3e0"/>
  <text x="650" y="90" class="label">强化学习</text>
  <text x="650" y="110" class="desc">试错学习</text>
  <text x="650" y="130" class="desc">奖励/惩罚</text>
  <text x="650" y="150" class="desc">策略优化</text>

  <!-- 共同点 -->
  <rect x="200" y="260" width="400" height="100" class="box" fill="#f5f5f5"/>
  <text x="400" y="290" class="label" font-size="16"> similarities</text>
  <text x="400" y="320" class="desc">都需要数据</text>
  <text x="400" y="345" class="desc">都能从经验中改进</text>

  <!-- 箭头 -->
  <line x1="150" y1="180" x2="150" y2="240" class="arrow"/>
  <line x1="400" y1="180" x2="400" y2="240" class="arrow"/>
  <line x1="650" y1="180" x2="650" y2="240" class="arrow"/>

</svg>