<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 2; rx: 6; }
    .header { fill: #1976d2; }
    .label { font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
    .desc { font-size: 12px; fill: #666; text-anchor: middle; }
    .arrow { stroke: #666; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="400" y="30" class="label" font-size="18">AI 原生应用演进</text>

  <!-- 阶段1：传统软件 -->
  <rect x="50" y="80" width="180" height="100" class="box"/>
  <text x="140" y="110" class="label">传统软件</text>
  <text x="140" y="130" class="desc">点击式界面</text>
  <text x="140" y="150" class="desc">固定功能</text>

  <!-- 箭头 -->
  <line x1="230" y1="130" x2="290" y2="130" class="arrow"/>
  <text x="260" y="145" class="desc" font-size="11">→</text>

  <!-- 阶段2：AI增强 -->
  <rect x="310" y="80" width="180" height="100" class="box" fill="#e3f2fd"/>
  <text x="400" y="110" class="label">AI增强</text>
  <text x="400" y="130" class="desc">智能助手</text>
  <text x="400" y="150" class="desc">（如Copilot）</text>

  <!-- 箭头 -->
  <line x1="490" y1="130" x2="550" y2="130" class="arrow"/>

  <!-- 阶段3：AI原生 -->
  <rect x="570" y="80" width="180" height="100" class="box" fill="#e8f5e9"/>
  <text x="660" y="110" class="label">AI原生</text>
  <text x="660" y="130" class="desc">对话即界面</text>
  <text x="660" y="150" class="desc">（如ChatGPT）</text>

  <!-- 底部说明 -->
  <text x="400" y="260" class="desc" font-size="13">AI 原生应用的核心：从"人适应软件"到"软件适应人"</text>
</svg>